name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Habilita o GitHub Pages via API (build_type = workflow).
      # Ignora erro caso já exista. Usa o GITHUB_TOKEN do próprio Actions.
      - name: Enable Pages (workflow source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          echo "Habilitando Pages em https://api.github.com/repos/$REPO/pages ..."
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pages" \
            -d '{"build_type":"workflow"}')
          echo "HTTP $code"
          cat /tmp/resp.json
          echo ""
          if [ "$code" = "201" ] || [ "$code" = "422" ]; then
            echo "Pages OK (criado agora OU já existia)."
          else
            echo "Aviso: resposta $code (se já existir, segue mesmo)."
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
