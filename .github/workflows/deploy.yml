name: Deploy Pages (no-op)

# O GitHub Pages deste repo publica direto da branch main (root),
# em Settings → Pages → Source: "Deploy from a branch".
# Este workflow fica inerte para não conflitar com o deploy por branch.
on:
  workflow_dispatch: {}

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Pages publica direto da branch main — nada a fazer aqui."
