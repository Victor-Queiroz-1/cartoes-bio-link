name: Deploy Pages (inerte)

# O GitHub Pages publica direto da branch main (root).
# Habilitar em: Settings -> Pages -> Source: "Deploy from a branch" -> main / (root).
# (A criacao inicial do Pages exige admin do repo; o GITHUB_TOKEN nao tem esse escopo,
#  por isso este workflow fica manual/inerte para nao conflitar com o deploy por branch.)
on:
  workflow_dispatch: {}

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Pages publica direto da branch main. Nada a fazer aqui."
