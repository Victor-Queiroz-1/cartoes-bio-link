name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Habilita o Pages (build_type=workflow) via API com o GITHUB_TOKEN.
      # Falha explicitamente se não conseguir — assim temos sinal real.
      - name: Enable Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          code=$(curl -s -o /tmp/r.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pages" \
            -d '{"build_type":"workflow"}')
          echo "Enable HTTP $code"; cat /tmp/r.json; echo
          case "$code" in
            200|201|422) echo "Pages OK";;
            *) echo "FALHA: token nao conseguiu habilitar Pages (HTTP $code)"; exit 1;;
          esac

      # Sem configure-pages (vinha falhando e é dispensável p/ HTML estático).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
